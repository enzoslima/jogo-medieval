<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cavaleiro Medieval - Versão Épica</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #0a0a0a;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', Arial, sans-serif;
}

#ui {
    width: 900px;
    padding: 15px 20px;
    background: linear-gradient(180deg, #2a1a0a, #1a0f05);
    border: 3px solid #8b5a2b;
    border-bottom: none;
    border-radius: 10px 10px 0 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: #f4e4bc;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
}

.stat {
    display: flex;
    align-items: center;
    gap: 8px;
}

.stat-icon {
    font-size: 22px;
}

.stat-bar {
    width: 120px;
    height: 18px;
    background: #333;
    border-radius: 10px;
    overflow: hidden;
    border: 2px solid #555;
}

#vida-bar {
    height: 100%;
    background: linear-gradient(180deg, #ff6b6b, #c92a2a);
    transition: width 0.3s;
    box-shadow: 0 0 10px #ff0000;
}

#stamina-bar {
    height: 100%;
    background: linear-gradient(180deg, #4ecdc4, #2a9d8f);
    transition: width 0.1s;
    box-shadow: 0 0 10px #00ffaa;
}

#boss-container {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 2px;
}

#boss-phase {
    font-size: 10px;
    color: #ff4500;
    font-weight: bold;
}

#boss-bar {
    width: 150px;
    height: 12px;
    background: #333;
    border-radius: 8px;
    overflow: hidden;
    border: 2px solid #800;
}

#boss-vida-bar {
    height: 100%;
    background: linear-gradient(180deg, #ff4500, #8b0000);
    transition: width 0.3s;
}

.stat-text {
    font-size: 16px;
    font-weight: bold;
}

canvas {
    border: 3px solid #8b5a2b;
    border-radius: 0 0 10px 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

#controls {
    margin-top: 20px;
    color: #888;
    font-size: 14px;
    text-align: center;
}

#controls span {
    background: #333;
    padding: 5px 10px;
    border-radius: 5px;
    margin: 0 5px;
    border: 1px solid #555;
}

#shield-indicator {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    color: #4ecdc4;
    font-size: 24px;
    font-weight: bold;
    text-shadow: 0 0 10px #4ecdc4;
    opacity: 0;
    transition: opacity 0.3s;
}

#phase-alert {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #ff0000;
    font-size: 48px;
    font-weight: bold;
    text-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000, 0 0 60px #ff0000;
    opacity: 0;
    transition: opacity 0.5s;
    text-align: center;
    pointer-events: none;
    z-index: 1000;
}
</style>
</head>
<body>

<div id="ui">
    <div class="stat">
        <span class="stat-icon">❤️</span>
        <div class="stat-bar">
            <div id="vida-bar" style="width: 100%"></div>
        </div>
        <span class="stat-text"><span id="vida">200</span></span>
    </div>
    
    <div class="stat">
        <span class="stat-icon">🛡️</span>
        <div class="stat-bar">
            <div id="stamina-bar" style="width: 100%"></div>
        </div>
        <span class="stat-text"><span id="stamina">150</span></span>
    </div>
    
    <div class="stat" id="boss-container">
        <span class="stat-icon">🐉</span>
        <span id="boss-phase">FASE 1</span>
        <div id="boss-bar">
            <div id="boss-vida-bar" style="width: 100%"></div>
        </div>
    </div>
    
    <div class="stat">
        <span class="stat-icon">🏹</span>
        <span class="stat-text"><span id="flechas">25</span></span>
    </div>
    
    <div class="stat">
        <span class="stat-icon">💀</span>
        <span class="stat-text"><span id="inimigos">0</span></span>
    </div>
    
    <div class="stat">
        <span class="stat-icon">⭐</span>
        <span class="stat-text"><span id="score">0</span></span>
    </div>
</div>

<canvas id="game" width="900" height="450"></canvas>

<div id="shield-indicator">🛡️ DEFENDENDO!</div>
<div id="phase-alert">🔥 FASE 2 🔥<br><span style="font-size: 24px;">O DRAGÃO DESPERTOU SUA FÚRIA!</span></div>

<div id="controls">
    <span>← →</span> Mover
    <span>Espaço</span> Pular
    <span>F</span> Espada
    <span>G</span> Arco
    <span>S / Shift</span> Escudo 🛡️
    <span>R</span> Reiniciar
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let keys = {};
let gameState = "playing";
let score = 0;
let screenShake = 0;
let time = 0;

document.addEventListener("keydown", e => {
    keys[e.key] = true;
    keys[e.key.toLowerCase()] = true;
    if(e.key === "r" || e.key === "R") restartGame();
});
document.addEventListener("keyup", e => {
    keys[e.key] = false;
    keys[e.key.toLowerCase()] = false;
});

let particles = [];

class Particle {
    constructor(x, y, color, type = "normal") {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 8;
        this.vy = (Math.random() - 0.5) * 8 - 2;
        this.life = 1;
        this.decay = 0.02 + Math.random() * 0.02;
        this.color = color;
        this.size = 3 + Math.random() * 4;
        this.type = type;
    }
    
    update() {
        this.x += this.vx;
        this.y += this.vy;
        if(this.type === "smoke") {
            this.vy -= 0.05;
            this.vx *= 0.98;
        } else if(this.type === "rage") {
            this.vy -= 0.1;
            this.size *= 1.01;
        } else {
            this.vy += 0.2;
        }
        this.life -= this.decay;
        if(this.type !== "rage") this.size *= 0.98;
    }
    
    draw() {
        ctx.save();
        ctx.globalAlpha = this.life;
        if(this.type === "fire") {
            let gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
            gradient.addColorStop(0, "#fff");
            gradient.addColorStop(0.3, "#ff0");
            gradient.addColorStop(0.7, "#f50");
            gradient.addColorStop(1, "transparent");
            ctx.fillStyle = gradient;
        } else if(this.type === "smoke") {
            ctx.fillStyle = `rgba(100, 100, 100, ${this.life * 0.5})`;
        } else if(this.type === "shield") {
            let gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
            gradient.addColorStop(0, "#fff");
            gradient.addColorStop(0.5, "#4ecdc4");
            gradient.addColorStop(1, "transparent");
            ctx.fillStyle = gradient;
        } else if(this.type === "dragonfire") {
            let gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
            gradient.addColorStop(0, "#fff");
            gradient.addColorStop(0.2, "#ffff00");
            gradient.addColorStop(0.5, "#ff6600");
            gradient.addColorStop(0.8, "#ff0000");
            gradient.addColorStop(1, "transparent");
            ctx.fillStyle = gradient;
        } else if(this.type === "rage") {
            let gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
            gradient.addColorStop(0, "#ff0000");
            gradient.addColorStop(0.5, "#aa0000");
            gradient.addColorStop(1, "transparent");
            ctx.fillStyle = gradient;
        } else {
            ctx.fillStyle = this.color;
        }
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

function spawnParticles(x, y, color, count, type = "normal") {
    for(let i = 0; i < count; i++) {
        particles.push(new Particle(x, y, color, type));
    }
}

let blockEffects = [];

class BlockEffect {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.life = 1;
        this.radius = 20;
    }
    update() {
        this.life -= 0.05;
        this.radius += 3;
    }
    draw() {
        ctx.save();
        ctx.globalAlpha = this.life;
        ctx.strokeStyle = "#4ecdc4";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius * 0.7, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
    }
}

let player = {
    x: 100, y: 300, w: 45, h: 60,
    vx: 0, vy: 0,
    vida: 200, maxVida: 200,
    stamina: 150, maxStamina: 150,
    flechas: 25,
    dir: 1, onGround: false,
    attacking: false, attackTimer: 0,
    walkFrame: 0, invincible: 0,
    blocking: false, blockCooldown: 0,
    perfectBlockWindow: 0, blockedAttacks: 0
};

let arrows = [];
let fireballs = [];
let slashEffects = [];
let enemies = [];

let boss = {
    x: 780, y: 220, w: 120, h: 120,
    vida: 50, maxVida: 50,
    vida2: 70, maxVida2: 70,
    currentPhase: 1,
    active: false, attackTimer: 0,
    floatOffset: 0, wingAngle: 0,
    breathTimer: 0, isBreathing: false,
    mouthOpen: 0, eyeGlow: 0, tailAngle: 0,
    rageMode: false, rageAuraSize: 0,
    transforming: false, transformTimer: 0,
    rageParticleTimer: 0
};

function initEnemies() {
    enemies = [
        {x: 300, y: 310, w: 40, h: 45, type: "zombie", vida: 3, maxVida: 3, dir: -1},
        {x: 450, y: 310, w: 35, h: 40, type: "goblin", vida: 2, maxVida: 2, dir: -1, jumpTimer: 0},
        {x: 550, y: 310, w: 40, h: 45, type: "zombie", vida: 3, maxVida: 3, dir: -1},
        {x: 650, y: 310, w: 45, h: 50, type: "skeleton", vida: 4, maxVida: 4, dir: -1},
        {x: 750, y: 310, w: 35, h: 40, type: "goblin", vida: 2, maxVida: 2, dir: -1, jumpTimer: 0}
    ];
}

initEnemies();

function rectCollision(a, b) {
    return (a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y);
}

function drawBackground() {
    let skyGradient = ctx.createLinearGradient(0, 0, 0, 350);
    if(boss.active && boss.currentPhase === 2) {
        let r = Math.min(boss.rageAuraSize / 100, 1);
        skyGradient.addColorStop(0, `rgb(${26+40*r}, ${10-5*r}, ${46-20*r})`);
        skyGradient.addColorStop(0.3, `rgb(${45+50*r}, ${27-10*r}, ${78-30*r})`);
        skyGradient.addColorStop(0.6, `rgb(${74+60*r}, ${44-20*r}, ${106-40*r})`);
        skyGradient.addColorStop(1, `rgb(${107+50*r}, ${58-30*r}, ${125-50*r})`);
    } else {
        skyGradient.addColorStop(0, "#1a0a2e");
        skyGradient.addColorStop(0.3, "#2d1b4e");
        skyGradient.addColorStop(0.6, "#4a2c6a");
        skyGradient.addColorStop(1, "#6b3a7d");
    }
    ctx.fillStyle = skyGradient;
    ctx.fillRect(0, 0, 900, 350);

    ctx.fillStyle = "#fff";
    for(let i = 0; i < 50; i++) {
        let sx = (i * 73 + time * 0.1) % 900;
        let sy = (i * 37) % 150;
        let size = (Math.sin(time * 0.05 + i) + 1) * 1.5;
        ctx.globalAlpha = 0.5 + Math.sin(time * 0.1 + i) * 0.3;
        ctx.beginPath();
        ctx.arc(sx, sy, size, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;

    ctx.fillStyle = (boss.active && boss.currentPhase === 2) ? "#ff6666" : "#ffe4b5";
    ctx.beginPath();
    ctx.arc(750, 80, 40, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#ddd";
    ctx.beginPath(); ctx.arc(740, 75, 8, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(760, 90, 5, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = "#2a1a3a";
    ctx.beginPath();
    ctx.moveTo(0, 350);
    for(let x = 0; x <= 900; x += 100) ctx.lineTo(x, 280 + Math.sin(x * 0.01) * 40);
    ctx.lineTo(900, 350);
    ctx.fill();

    ctx.fillStyle = "#1a0f2a";
    ctx.beginPath();
    ctx.moveTo(0, 350); ctx.lineTo(100, 280); ctx.lineTo(200, 320);
    ctx.lineTo(350, 260); ctx.lineTo(500, 310); ctx.lineTo(600, 270);
    ctx.lineTo(750, 290); ctx.lineTo(900, 250); ctx.lineTo(900, 350);
    ctx.fill();

    for(let i = 0; i < 8; i++) {
        let tx = i * 120 + 50, ty = 320;
        ctx.fillStyle = "#0d0d0d";
        ctx.beginPath();
        ctx.moveTo(tx, ty);
        ctx.lineTo(tx + 20, ty - 60 - Math.sin(i) * 20);
        ctx.lineTo(tx + 40, ty);
        ctx.fill();
    }
}

function drawGround() {
    let g = ctx.createLinearGradient(0, 350, 0, 380);
    g.addColorStop(0, "#2d5a27"); g.addColorStop(1, "#1a3d15");
    ctx.fillStyle = g;
    ctx.fillRect(0, 350, 900, 30);

    ctx.strokeStyle = "#3d7a37"; ctx.lineWidth = 2;
    for(let i = 0; i < 60; i++) {
        let gx = i * 15 + Math.sin(i) * 5;
        ctx.beginPath();
        ctx.moveTo(gx, 350);
        ctx.lineTo(gx + Math.sin(time * 0.05 + i) * 3, 345 - Math.random() * 5);
        ctx.stroke();
    }

    let d = ctx.createLinearGradient(0, 380, 0, 450);
    d.addColorStop(0, "#5c3d2e"); d.addColorStop(0.5, "#4a2f23"); d.addColorStop(1, "#3a2518");
    ctx.fillStyle = d;
    ctx.fillRect(0, 380, 900, 70);

    ctx.fillStyle = "#3a3a3a";
    for(let i = 0; i < 15; i++) {
        ctx.beginPath();
        ctx.ellipse((i * 67) % 900, 390 + (i * 13) % 40, 8 + (i % 5), 5, 0, 0, Math.PI * 2);
        ctx.fill();
    }
}

function drawPlayer() {
    ctx.save();
    ctx.translate(player.x + player.w/2, player.y + player.h/2);
    ctx.scale(player.dir, 1);
    ctx.translate(-player.w/2, -player.h/2);

    if(player.invincible > 0 && Math.floor(player.invincible * 10) % 2 === 0) ctx.globalAlpha = 0.5;

    if(player.blocking && player.stamina > 0) {
        ctx.save();
        ctx.globalAlpha = 0.3 + Math.sin(time * 0.3) * 0.1;
        let sg = ctx.createRadialGradient(player.w/2, player.h/2, 10, player.w/2, player.h/2, 50);
        sg.addColorStop(0, "#4ecdc4"); sg.addColorStop(0.5, "#2a9d8f"); sg.addColorStop(1, "transparent");
        ctx.fillStyle = sg;
        ctx.beginPath(); ctx.arc(player.w/2, player.h/2, 50, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
    }

    ctx.fillStyle = "rgba(0,0,0,0.3)";
    ctx.beginPath(); ctx.ellipse(player.w/2, player.h + 5, 20, 8, 0, 0, Math.PI * 2); ctx.fill();

    let legOffset = player.blocking ? 0 : Math.sin(player.walkFrame) * 5;
    ctx.fillStyle = "#4a4a4a";
    ctx.fillRect(8, 45 + (player.onGround ? legOffset : 0), 10, 15);
    ctx.fillRect(25, 45 + (player.onGround ? -legOffset : 0), 10, 15);
    ctx.fillStyle = "#2a1a0a";
    ctx.fillRect(6, 55, 14, 8); ctx.fillRect(23, 55, 14, 8);

    let ag = ctx.createLinearGradient(5, 20, 40, 50);
    ag.addColorStop(0, "#c0c0c0"); ag.addColorStop(0.5, "#808080"); ag.addColorStop(1, "#606060");
    ctx.fillStyle = ag;
    ctx.fillRect(8, 25, 30, 25);
    ctx.strokeStyle = "#404040"; ctx.lineWidth = 1;
    ctx.strokeRect(8, 25, 30, 25);
    ctx.beginPath(); ctx.moveTo(23, 25); ctx.lineTo(23, 50); ctx.stroke();

    ctx.fillStyle = "#909090";
    let armAngle = player.attacking ? -Math.PI/3 : Math.sin(player.walkFrame) * 0.3;
    ctx.save();
    ctx.translate(35, 30); ctx.rotate(armAngle);
    ctx.fillRect(0, -4, 20, 8);
    if(!player.attacking) {
        ctx.fillStyle = "#8b4513"; ctx.fillRect(18, -3, 8, 6);
        ctx.fillStyle = "#c0c0c0"; ctx.fillRect(26, -2, 20, 4);
    }
    ctx.restore();

    let hg = ctx.createLinearGradient(10, 0, 35, 25);
    hg.addColorStop(0, "#d0d0d0"); hg.addColorStop(0.5, "#a0a0a0"); hg.addColorStop(1, "#707070");
    ctx.fillStyle = hg;
    ctx.beginPath();
    ctx.moveTo(10, 25); ctx.lineTo(8, 10); ctx.lineTo(15, 2);
    ctx.lineTo(30, 2); ctx.lineTo(37, 10); ctx.lineTo(35, 25);
    ctx.closePath(); ctx.fill(); ctx.stroke();

    ctx.fillStyle = "#1a1a2e"; ctx.fillRect(12, 12, 20, 8);
    ctx.fillStyle = player.blocking ? "#4ecdc4" : "#4af";
    ctx.fillRect(15, 14, 4, 4); ctx.fillRect(25, 14, 4, 4);

    ctx.fillStyle = "#c41e3a";
    ctx.beginPath();
    ctx.moveTo(22, 2); ctx.quadraticCurveTo(25, -15, 35, -10);
    ctx.quadraticCurveTo(28, -8, 22, 2); ctx.fill();

    if(player.blocking && player.stamina > 0) {
        ctx.save();
        let sg2 = ctx.createRadialGradient(25, 35, 0, 25, 35, 30);
        sg2.addColorStop(0, "rgba(78, 205, 196, 0.5)"); sg2.addColorStop(1, "transparent");
        ctx.fillStyle = sg2;
        ctx.beginPath(); ctx.arc(25, 35, 30, 0, Math.PI * 2); ctx.fill();

        let shg = ctx.createLinearGradient(40, 15, 60, 55);
        shg.addColorStop(0, "#5dade2"); shg.addColorStop(0.3, "#2e86ab");
        shg.addColorStop(0.7, "#1a5276"); shg.addColorStop(1, "#0d3b54");
        ctx.fillStyle = shg;
        ctx.beginPath();
        ctx.moveTo(40, 10); ctx.lineTo(65, 15); ctx.lineTo(70, 35);
        ctx.lineTo(65, 55); ctx.lineTo(52, 65); ctx.lineTo(40, 55);
        ctx.lineTo(35, 35); ctx.lineTo(40, 15); ctx.closePath(); ctx.fill();
        ctx.strokeStyle = "#ffd700"; ctx.lineWidth = 3; ctx.stroke();
        ctx.strokeStyle = "#ffd700"; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(52, 20); ctx.lineTo(52, 55);
        ctx.moveTo(40, 35); ctx.lineTo(65, 35); ctx.stroke();
        ctx.fillStyle = "rgba(255, 255, 255, 0.3)";
        ctx.beginPath(); ctx.ellipse(48, 28, 8, 12, -0.3, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
    } else {
        let rsg = ctx.createLinearGradient(-10, 20, 10, 50);
        rsg.addColorStop(0, "#8b0000"); rsg.addColorStop(0.5, "#5c0000"); rsg.addColorStop(1, "#3a0000");
        ctx.fillStyle = rsg;
        ctx.beginPath();
        ctx.moveTo(-5, 20); ctx.lineTo(8, 18); ctx.lineTo(10, 35);
        ctx.lineTo(8, 50); ctx.lineTo(-5, 48); ctx.lineTo(-8, 35); ctx.closePath(); ctx.fill();
        ctx.strokeStyle = "#ffd700"; ctx.lineWidth = 2; ctx.stroke();
        ctx.fillStyle = "#ffd700";
        ctx.beginPath(); ctx.arc(2, 35, 5, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
}

function drawEnemy(e) {
    ctx.save();
    ctx.translate(e.x + e.w/2, e.y + e.h/2);

    ctx.fillStyle = "rgba(0,0,0,0.3)";
    ctx.beginPath(); ctx.ellipse(0, e.h/2 + 5, 15, 6, 0, 0, Math.PI * 2); ctx.fill();

    if(e.type === "zombie") {
        let bg = ctx.createLinearGradient(-15, -20, 15, 20);
        bg.addColorStop(0, "#4a7c4a"); bg.addColorStop(0.5, "#2d5a2d"); bg.addColorStop(1, "#1a3d1a");
        ctx.fillStyle = bg; ctx.fillRect(-15, -10, 30, 35);
        ctx.fillStyle = "#4a7c4a";
        ctx.beginPath(); ctx.arc(0, -15, 12, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#ff0000";
        ctx.beginPath(); ctx.arc(-5, -17, 3, 0, Math.PI * 2); ctx.arc(5, -17, 3, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#1a1a1a"; ctx.fillRect(-6, -10, 12, 5);
        ctx.fillStyle = "#3a6a3a"; ctx.fillRect(-25, -5, 15, 6); ctx.fillRect(10, -5, 15, 6);
    } else if(e.type === "goblin") {
        ctx.fillStyle = "#6b4c9a"; ctx.fillRect(-12, -5, 24, 25);
        ctx.fillStyle = "#8b5cb4";
        ctx.beginPath(); ctx.arc(0, -12, 14, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#7b4ca4";
        ctx.beginPath(); ctx.moveTo(-14,-15); ctx.lineTo(-22,-25); ctx.lineTo(-12,-8); ctx.fill();
        ctx.beginPath(); ctx.moveTo(14,-15); ctx.lineTo(22,-25); ctx.lineTo(12,-8); ctx.fill();
        ctx.fillStyle = "#ffff00";
        ctx.beginPath(); ctx.arc(-5,-14,4,0,Math.PI*2); ctx.arc(5,-14,4,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = "#000";
        ctx.beginPath(); ctx.arc(-5,-14,2,0,Math.PI*2); ctx.arc(5,-14,2,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle = "#000"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(0, -8, 8, 0.2, Math.PI - 0.2); ctx.stroke();
    } else if(e.type === "skeleton") {
        ctx.strokeStyle = "#e0e0e0"; ctx.lineWidth = 3;
        for(let i = 0; i < 4; i++) { ctx.beginPath(); ctx.moveTo(-12, -5+i*8); ctx.lineTo(12, -5+i*8); ctx.stroke(); }
        ctx.beginPath(); ctx.moveTo(0, -10); ctx.lineTo(0, 25); ctx.stroke();

        ctx.beginPath(); ctx.arc(0, -18, 14, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#000";
        ctx.beginPath(); ctx.arc(-5,-20,4,0,Math.PI*2); ctx.arc(5,-20,4,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.moveTo(0,-16); ctx.lineTo(-3,-12); ctx.lineTo(3,-12); ctx.closePath(); ctx.fill();

        ctx.beginPath(); ctx.moveTo(-8,-8); ctx.lineTo(-10,-5); ctx.lineTo(10,-5); ctx.lineTo(8,-8); ctx.stroke();
    }

    let bw = 30, bh = 4;
    ctx.fillStyle = "#333"; ctx.fillRect(-bw/2, -e.h/2-15, bw, bh);
    ctx.fillStyle = "#ff3333"; ctx.fillRect(-bw/2, -e.h/2-15, bw*(e.vida/e.maxVida), bh);
    ctx.restore();
}

function drawTransformation() {
    boss.transformTimer++;
    let progress = boss.transformTimer / 120;
    ctx.save();
    ctx.translate(boss.x+boss.w/2, boss.y+boss.h/2);
    ctx.fillStyle=`rgba(0,0,0,${0.5*Math.sin(progress*Math.PI)})`;
    ctx.fillRect(-boss.x-boss.w/2,-boss.y-boss.h/2,900,450);
    for(let i=0;i<5;i++){
        let rp=(progress*3+i*0.2)%1, rs=rp*200;
        ctx.strokeStyle=`rgba(255,0,0,${1-rp})`; ctx.lineWidth=5-rp*4;
        ctx.beginPath(); ctx.arc(0,0,rs,0,Math.PI*2); ctx.stroke();
    }
    ctx.fillStyle=`rgba(255,0,0,${0.5+Math.sin(time*0.5)*0.3})`;
    ctx.beginPath(); ctx.arc(0,0,60+Math.sin(time*0.3)*20,0,Math.PI*2); ctx.fill();
    ctx.fillStyle="#000"; ctx.beginPath(); ctx.ellipse(0,0,40,30,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle="#ff0000";
    ctx.beginPath(); ctx.arc(-15,-5,8+Math.sin(time*0.4)*3,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle="#ff0000"; ctx.lineWidth=3;
    for(let i=0;i<12;i++){
        let a=time*0.05+i*Math.PI/6, l=100+Math.sin(time*0.2+i)*50;
        ctx.globalAlpha=0.5+Math.sin(time*0.1+i)*0.3;
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(a)*l,Math.sin(a)*l); ctx.stroke();
    }
    ctx.globalAlpha=1;
    ctx.restore();
    if(boss.transformTimer%2===0) for(let i=0;i<5;i++) spawnParticles(boss.x+boss.w/2+(Math.random()-0.5)*150,boss.y+boss.h/2+(Math.random()-0.5)*150,"#ff0000",1,"rage");
    screenShake=8;
    if(boss.transformTimer>=120){boss.transforming=false;boss.rageMode=true;boss.rageAuraSize=100;document.getElementById("phase-alert").style.opacity="0";}
}

function drawFireballs() {
    fireballs.forEach(f => {
        ctx.save(); ctx.translate(f.x,f.y);
        for(let i=1;i<5;i++){
            ctx.globalAlpha=0.3-i*0.05;

        ctx.globalAlpha=1;

        ctx.fillStyle=gw; ctx.beginPath(); ctx.arc(0,0,f.isRage?35:25,0,Math.PI*2); ctx.fill();
        let cr=ctx.createRadialGradient(0,0,0,0,0,f.isRage?16:12);
        if(f.isRage){cr.addColorStop(0,"#fff");cr.addColorStop(0.2,"#ff6666");cr.addColorStop(0.5,"#ff0000");cr.addColorStop(0.8,"#aa0000");cr.addColorStop(1,"#660000");}
        else{cr.addColorStop(0,"#fff");cr.addColorStop(0.2,"#ffff00");cr.addColorStop(0.5,"#ff8800");cr.addColorStop(0.8,"#ff4400");cr.addColorStop(1,"#cc0000");}
        ctx.fillStyle=cr; ctx.beginPath(); ctx.arc(0,0,f.isRage?16:12,0,Math.PI*2); ctx.fill();
        ctx.restore();
        if(Math.random()<0.4) spawnParticles(f.x+10,f.y,f.isRage?"#ff0000":"#ff6600",1,"dragonfire");
    });
}

function drawSlashEffects() {
    slashEffects.forEach(s => {
        ctx.save(); ctx.translate(s.x,s.y); ctx.scale(s.dir,1); ctx.globalAlpha=s.life;
        ctx.strokeStyle="#fff"; ctx.lineWidth=3; ctx.lineCap="round";
        ctx.beginPath(); ctx.arc(0,0,40*(1-s.life*0.5),-Math.PI/4,Math.PI/4); ctx.stroke();
        ctx.strokeStyle="#aaf"; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(0,0,50*(1-s.life*0.5),-Math.PI/6,Math.PI/6); ctx.stroke();
        ctx.restore(); s.life-=0.08;
    });
    slashEffects=slashEffects.filter(s=>s.life>0);
}

function drawBlockEffects() {
    blockEffects.forEach(b=>{b.draw();b.update();});
    blockEffects=blockEffects.filter(b=>b.life>0);
}

function drawArrows() {
    arrows.forEach(a=>{
        ctx.save(); ctx.translate(a.x,a.y); ctx.rotate(a.vx>0?0:Math.PI);
        ctx.fillStyle="#8b4513"; ctx.fillRect(-15,-2,25,4);
        ctx.fillStyle="#c0c0c0";
        ctx.beginPath(); ctx.moveTo(10,-4); ctx.lineTo(18,0); ctx.lineTo(10,4); ctx.closePath(); ctx.fill();
        ctx.fillStyle="#fff";
        ctx.beginPath(); ctx.moveTo(-15,-2); ctx.lineTo(-20,-6); ctx.lineTo(-12,-2); ctx.fill();
        ctx.beginPath(); ctx.moveTo(-15,2); ctx.lineTo(-20,6); ctx.lineTo(-12,2); ctx.fill();
        ctx.restore();
    });
}

function updatePlayer() {
    let wb=keys["s"]||keys["S"]||keys["Shift"];
    if(wb&&player.stamina>0&&player.blockCooldown<=0){
        player.blocking=true; player.stamina-=0.2; player.vx=0;
        document.getElementById("shield-indicator").style.opacity="1";
    } else {
        if(player.blocking&&player.stamina<=0){player.blockCooldown=60;spawnParticles(player.x+player.w/2,player.y+player.h/2,"#4ecdc4",15,"shield");}
        player.blocking=false; document.getElementById("shield-indicator").style.opacity="0";
    }
    if(!player.blocking&&player.stamina<player.maxStamina) player.stamina+=0.4;
    if(player.blockCooldown>0) player.blockCooldown--;
    if(!player.blocking){
        player.vx=0;
        if(keys["ArrowRight"]||keys["d"]||keys["D"]){player.vx=5;player.dir=1;if(player.onGround)player.walkFrame+=0.3;}
        if(keys["ArrowLeft"]||keys["a"]||keys["A"]){player.vx=-5;player.dir=-1;if(player.onGround)player.walkFrame+=0.3;}
        if((keys[" "]||keys["ArrowUp"]||keys["w"]||keys["W"])&&player.onGround){player.vy=-12;player.onGround=false;}
    }
    player.x+=player.vx; player.x=Math.max(0,Math.min(player.x,canvas.width-player.w));
    player.vy+=0.5; player.y+=player.vy;
    if(player.y>295){player.y=295;player.vy=0;player.onGround=true;}
    if(player.attackTimer>0){player.attackTimer--;player.attacking=player.attackTimer>5;}
    if(player.invincible>0) player.invincible-=0.05;
}

function handleBlock(damage,ax,ay) {
    if(player.blocking&&player.stamina>0){
        player.stamina-=damage*1.5; player.blockedAttacks++; score+=25;
        blockEffects.push(new BlockEffect(player.x+player.w/2+player.dir*20,player.y+player.h/2));
        spawnParticles(player.x+player.w/2+player.dir*20,player.y+player.h/2,"#4ecdc4",10,"shield");
        screenShake=2; return true;
    }
    return false;
}

function updateEnemies() {
    enemies.forEach(e=>{
        let speed=e.type==="goblin"?2:(e.type==="skeleton"?1.2:0.8);
        if(player.x<e.x) e.x-=speed; else e.x+=speed;
        if(e.type==="goblin"){e.jumpTimer++;if(e.jumpTimer>60&&Math.random()<0.02){e.y-=30;e.jumpTimer=0;}if(e.y<310)e.y+=2;}
        if(rectCollision(player,e)&&player.invincible<=0){
            let dmg=e.type==="skeleton"?10:(e.type==="goblin"?6:8);
            if(!handleBlock(dmg,e.x+e.w/2,e.y+e.h/2)){player.vida-=dmg;player.invincible=1;screenShake=5;spawnParticles(player.x+player.w/2,player.y+player.h/2,"#ff0000",10,"blood");}
        }
    });
    enemies=enemies.filter(e=>e.vida>0);
    if(enemies.length===0&&!boss.active){
        boss.active=true;
        document.getElementById("boss-container").style.display="flex";
        document.getElementById("boss-phase").innerText="FASE 1";
    }
}

function triggerPhase2() {
    boss.currentPhase=2; boss.transforming=true; boss.transformTimer=0;
    document.getElementById("phase-alert").style.opacity="1";
    document.getElementById("boss-phase").innerText="⚠ FASE 2 ⚠";
    document.getElementById("boss-phase").style.color="#ff0000";
    player.vida=Math.min(player.vida+50,player.maxVida);
    player.stamina=player.maxStamina;
    score+=500;
}

function updateBoss() {
    if(!boss.active) return;
    if(boss.transforming) return;
    boss.floatOffset+=0.05;
    if(boss.rageMode&&boss.rageAuraSize<120) boss.rageAuraSize+=0.5;
    if(boss.currentPhase===1&&boss.vida<=0){triggerPhase2();return;}
    let ac=boss.currentPhase===2?0.05:0.025;
    if(Math.random()<ac&&!boss.isBreathing){boss.isBreathing=true;boss.breathTimer=boss.currentPhase===2?25:30;}
    if(boss.isBreathing){
        boss.breathTimer--;
        if(boss.breathTimer===15){
            fireballs.push({x:boss.x-20,y:boss.y+50,vx:boss.currentPhase===2?-9:-7,isRage:boss.currentPhase===2});
            if(boss.currentPhase===2){
                setTimeout(()=>{if(boss.active&&boss.vida2>0)fireballs.push({x:boss.x-20,y:boss.y+30,vx:-8,isRage:true});},150);
                setTimeout(()=>{if(boss.active&&boss.vida2>0)fireballs.push({x:boss.x-20,y:boss.y+70,vx:-7,isRage:true});},300);
            }
        }
        if(boss.breathTimer<=0) boss.isBreathing=false;
    }
    fireballs.forEach(f=>{
        f.x+=f.vx; f.y+=Math.sin(f.x*0.02)*(f.isRage?3:2);
        if(f.x>player.x&&f.x<player.x+player.w&&f.y>player.y&&f.y<player.y+player.h&&player.invincible<=0){
            let dmg=f.isRage?30:20;
            if(!handleBlock(dmg,f.x,f.y)){player.vida-=dmg;player.invincible=1;screenShake=f.isRage?15:10;spawnParticles(player.x+player.w/2,player.y+player.h/2,f.isRage?"#ff0000":"#ff6600",20,"fire");}
            f.vx=0;
        }
    });
    fireballs=fireballs.filter(f=>f.vx!==0&&f.x>-50);
    let pd=boss.currentPhase===2?0.8:0.4, pr=boss.currentPhase===2?120:100;
    if(Math.abs(player.x-boss.x)<pr&&player.invincible<=0){if(!handleBlock(10,boss.x,boss.y+boss.h/2))player.vida-=pd;}
    if(boss.currentPhase===1){document.getElementById("boss-vida-bar").style.width=(boss.vida/boss.maxVida*100)+"%";}
    else{document.getElementById("boss-vida-bar").style.width=(boss.vida2/boss.maxVida2*100)+"%";document.getElementById("boss-vida-bar").style.background="linear-gradient(180deg, #ff0000, #880000)";}
}

function swordAttack() {
    if(player.attackTimer>0||player.blocking) return;
    player.attackTimer=20; player.attacking=true;
    slashEffects.push({x:player.x+player.w/2+player.dir*30,y:player.y+player.h/2,dir:player.dir,life:1});
    enemies.forEach(e=>{
        let dist=Math.abs((player.x+player.w/2)-(e.x+e.w/2));
        if(dist<70&&Math.sign(e.x-player.x)===player.dir){
            e.vida--; screenShake=3;
            spawnParticles(e.x+e.w/2,e.y+e.h/2,e.type==="zombie"?"#4a7c4a":"#8b5cb4",8);
            score+=10;
            if(e.vida<=0){spawnParticles(e.x+e.w/2,e.y+e.h/2,"#ffff00",15);score+=100;}
        }
    });
    if(boss.active&&!boss.transforming){
        let dist=Math.abs((player.x+player.w/2)-(boss.x+boss.w/2));
        if(dist<120){
            let dmg=2;
            if(boss.currentPhase===1) boss.vida-=dmg; else boss.vida2-=dmg;
            screenShake=5; spawnParticles(boss.x+30,boss.y+boss.h/2,"#ff0000",12); score+=30;
        }
    }
}

function shootArrow() {
    if(player.flechas<=0||player.attackTimer>0||player.blocking) return;
    player.attackTimer=15;
    arrows.push({x:player.x+player.w/2,y:player.y+25,vx:10*player.dir});
    player.flechas--;
}

document.addEventListener("keydown", e=>{
    if(gameState!=="playing") return;
    if(e.key==="f"||e.key==="F") swordAttack();
    if(e.key==="g"||e.key==="G") shootArrow();
});

function updateArrows() {
    arrows.forEach(a=>{
        a.x+=a.vx;
        enemies.forEach(e=>{
            if(a.x>e.x&&a.x<e.x+e.w&&a.y>e.y&&a.y<e.y+e.h){
                e.vida-=2; spawnParticles(a.x,a.y,"#ffff00",5); a.vx=0; score+=15;
                if(e.vida<=0){spawnParticles(e.x+e.w/2,e.y+e.h/2,"#ffff00",15);score+=100;}
            }
        });
        if(boss.active&&!boss.transforming&&a.x>boss.x&&a.x<boss.x+boss.w&&a.y>boss.y&&a.y<boss.y+boss.h){
            let dmg=3;
            if(boss.currentPhase===1) boss.vida-=dmg; else boss.vida2-=dmg;
            spawnParticles(a.x,a.y,"#ff6600",8); a.vx=0; score+=35;
        }
    });
    arrows=arrows.filter(a=>a.vx!==0&&a.x>0&&a.x<canvas.width);
}

function updateParticles() {
    particles.forEach(p=>p.update());
    particles=particles.filter(p=>p.life>0);
}

function updateUI() {
    document.getElementById("vida").innerText=Math.max(0,Math.floor(player.vida));
    document.getElementById("vida-bar").style.width=Math.max(0,(player.vida/player.maxVida)*100)+"%";
    document.getElementById("stamina").innerText=Math.max(0,Math.floor(player.stamina));
    document.getElementById("stamina-bar").style.width=Math.max(0,(player.stamina/player.maxStamina)*100)+"%";
    document.getElementById("flechas").innerText=player.flechas;
    document.getElementById("inimigos").innerText=enemies.length;
    document.getElementById("score").innerText=score;
}

function gameOver() {
    ctx.fillStyle="rgba(0,0,0,0.85)"; ctx.fillRect(0,0,900,450);
    ctx.fillStyle="#8b0000"; ctx.font="bold 60px Arial"; ctx.textAlign="center";
    ctx.fillText("GAME OVER",450,180);
    ctx.fillStyle="#fff"; ctx.font="24px Arial";
    ctx.fillText(`Pontuação Final: ${score}`,450,240);
    ctx.fillText(`Ataques Bloqueados: ${player.blockedAttacks}`,450,275);
    ctx.fillStyle=boss.currentPhase===2?"#ff6666":"#888";
    ctx.fillText(boss.currentPhase===2?"Chegou na Fase 2 do Dragão!":"Não chegou na Fase 2",450,310);
    ctx.fillStyle="#aaa"; ctx.font="20px Arial";
    ctx.fillText("Pressione R para reiniciar",450,360);
    ctx.textAlign="left";
}

function victory() {
    ctx.fillStyle="rgba(0,0,0,0.85)"; ctx.fillRect(0,0,900,450);
    let gw=ctx.createRadialGradient(450,200,0,450,200,250);
    gw.addColorStop(0,"rgba(255,215,0,0.4)"); gw.addColorStop(0.5,"rgba(255,150,0,0.2)"); gw.addColorStop(1,"transparent");
    ctx.fillStyle=gw; ctx.fillRect(0,0,900,450);
    ctx.fillStyle="#ffd700"; ctx.font="bold 50px Arial"; ctx.textAlign="center";
    ctx.fillText("⚔️ VITÓRIA LENDÁRIA! ⚔️",450,120);
    ctx.fillStyle="#ff6666"; ctx.font="bold 28px Arial";
    ctx.fillText("🔥 Você derrotou a Fúria Ancestral! 🔥",450,180);
    ctx.fillStyle="#fff"; ctx.font="22px Arial";
    ctx.fillText("O Dragão foi destruído em ambas as formas!",450,225);
    ctx.fillStyle="#4ecdc4"; ctx.font="20px Arial";
    ctx.fillText(`🛡️ Ataques Bloqueados: ${player.blockedAttacks}`,450,275);
    ctx.fillStyle="#ffd700"; ctx.font="bold 28px Arial";
    ctx.fillText(`⭐ Pontuação: ${score}`,450,325);
    ctx.fillStyle="#aaa"; ctx.font="20px Arial";
    ctx.fillText("Pressione R para jogar novamente",450,380);
    ctx.textAlign="left";
}

function restartGame() {
    player.x=100;player.y=300;player.vida=200;player.stamina=150;player.flechas=25;
    player.invincible=0;player.blocking=false;player.blockCooldown=0;player.blockedAttacks=0;
    boss.vida=50;boss.vida2=70;boss.currentPhase=1;boss.active=false;boss.isBreathing=false;
    boss.transforming=false;boss.transformTimer=0;boss.rageMode=false;boss.rageAuraSize=0;
    arrows=[];fireballs=[];particles=[];slashEffects=[];blockEffects=[];score=0;gameState="playing";
    document.getElementById("boss-container").style.display="none";
    document.getElementById("shield-indicator").style.opacity="0";
    document.getElementById("phase-alert").style.opacity="0";
    document.getElementById("boss-phase").innerText="FASE 1";
    document.getElementById("boss-phase").style.color="#ff4500";
    document.getElementById("boss-vida-bar").style.background="linear-gradient(180deg, #ff4500, #8b0000)";
    initEnemies();
    game();
}

function game() {
    time++;
    ctx.save();
    if(screenShake>0){ctx.translate((Math.random()-0.5)*screenShake*2,(Math.random()-0.5)*screenShake*2);screenShake*=0.9;}
    ctx.clearRect(-10,-10,canvas.width+20,canvas.height+20);
    drawBackground();drawGround();
    updatePlayer();updateEnemies();updateBoss();updateArrows();updateParticles();
    enemies.forEach(e=>drawEnemy(e));
    drawBoss();drawPlayer();drawArrows();drawFireballs();drawSlashEffects();drawBlockEffects();
    particles.forEach(p=>p.draw());
    ctx.restore();
    updateUI();
    if(player.vida<=0){gameState="gameover";gameOver();return;}
    if(boss.currentPhase===2&&boss.vida2<=0&&boss.active&&!boss.transforming){
        gameState="victory";
        spawnParticles(boss.x+boss.w/2,boss.y+boss.h/2,"#ffd700",100);
        spawnParticles(boss.x+boss.w/2,boss.y+boss.h/2,"#ff0000",50);
        victory();return;
    }
    requestAnimationFrame(game);
}

game();
</script>
